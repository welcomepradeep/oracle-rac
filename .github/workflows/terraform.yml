name: Terraform apply 

on:
  workflow_dispatch:    # manual trigger only — never auto-apply
    inputs:
      confirm:
        description: "Type APPLY to confirm VM creation"
        required: true
        default: ""

jobs:
  terraform-apply:
    name: Apply — create VMs
    runs-on: self-hosted
    if: github.event.inputs.confirm == 'APPLY'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Terraform init
        run: terraform init
 
      - name: Terraform plan        # Always plan before apply — shows what will change
        run: terraform plan
 
      - name: Terraform apply
        run: terraform apply -auto-approve
 
      - name: Show outputs
        run: terraform output vm_summary