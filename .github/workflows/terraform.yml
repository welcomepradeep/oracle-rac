name: Terraform

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: [self-hosted, windows]   # since you started your own runner

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        
      
      - name: Terraform Plan
        run: terraform plan
        

      # ⚠️ apply only if you really want auto-deploy
      - name: Terraform Apply
        run: terraform apply -auto-approve