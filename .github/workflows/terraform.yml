name: terraform

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run terraform
        run: |
          cd /u02/stage/actions-runner/_work/oracle-rac/oracle-rac/terraform
          pwd
          ls -la
          terraform init
          terraform plan
          terraform apply -auto-approve
        