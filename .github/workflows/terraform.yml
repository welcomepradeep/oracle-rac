name: terraform

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto-detect Terraform dir
        run: |
          TF_DIR=$(find . -name main.tf | head -n 1 | xargs dirname)
          echo "Using Terraform dir: $TF_DIR"


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run terraform
        run: |
          cd "$TF_DIR"
          pwd
          ls -la
          terraform init
          terraform plan
          terraform apply -auto-approve
        