name: Terraform Hyper-V Deployment

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug - Show Directory Structure
        run: |
          echo "Current Dir:"
          pwd
          echo "List root:"
          ls -la
          echo "List terraform folder:"
          ls -la terraform || echo "terraform folder not found"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform   # ✅ explicit path

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform